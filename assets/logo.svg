<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0e0e0e"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a5c0a"/>
      <stop offset="50%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#1db954"/>
    </linearGradient>
    <linearGradient id="greenGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#2ecc71"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(16,124,16,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="white" stroke-width="1">
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Glow behind gamepad -->
  <circle cx="256" cy="200" r="120" fill="rgba(16,124,16,0.08)" filter="url(#glow)"/>

  <!-- Gamepad -->
  <g transform="translate(116, 80)" filter="url(#shadow)">
    <!-- Main body -->
    <path d="M 40 80 Q 40 40 80 40 L 160 40 Q 200 40 200 80 L 200 120 Q 200 160 240 180 L 260 190 Q 280 200 280 220 L 280 230 Q 280 250 260 250 L 240 245 Q 200 235 180 240 L 160 245 Q 120 250 80 245 L 60 240 Q 40 235 20 250 L 0 255 Q -20 260 -20 240 L -20 230 Q -20 210 0 200 L 20 190 Q 60 175 60 140 L 60 120 Q 60 80 40 80 Z" 
          fill="url(#greenGrad)" stroke="url(#greenGradLight)" stroke-width="2"/>

    <!-- Left grip highlight -->
    <ellipse cx="30" cy="210" rx="35" ry="50" fill="url(#greenGrad)" opacity="0.8"/>

    <!-- Right grip highlight -->
    <ellipse cx="250" cy="210" rx="35" ry="50" fill="url(#greenGrad)" opacity="0.8"/>

    <!-- D-pad -->
    <g transform="translate(50, 120)">
      <rect x="0" y="-4" width="40" height="8" rx="2" fill="#0a0a0a"/>
      <rect x="16" y="-20" width="8" height="40" rx="2" fill="#0a0a0a"/>
    </g>

    <!-- ABXY Buttons -->
    <circle cx="200" cy="110" r="10" fill="#0a0a0a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="230" cy="140" r="10" fill="#0a0a0a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="200" cy="170" r="10" fill="#0a0a0a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <circle cx="170" cy="140" r="10" fill="#0a0a0a" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Button letters -->
    <text x="200" y="114" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1db954">Y</text>
    <text x="230" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1db954">B</text>
    <text x="200" y="174" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1db954">A</text>
    <text x="170" y="144" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="bold" fill="#1db954">X</text>

    <!-- Center / Guide button -->
    <circle cx="140" cy="140" r="18" fill="#0a0a0a" stroke="url(#greenGradLight)" stroke-width="2"/>
    <path d="M 132 135 L 148 140 L 132 145 Z" fill="url(#greenGradLight)"/>
  </g>

  <!-- Text: RQBBOX -->
  <text x="256" y="370" text-anchor="middle" font-family="Segoe UI Variable, Segoe UI, system-ui, sans-serif" font-size="54" font-weight="800" letter-spacing="4" fill="url(#greenGrad)">RQBBOX</text>

  <!-- Text: Experience OS 1.0 -->
  <text x="256" y="415" text-anchor="middle" font-family="Segoe UI Variable, Segoe UI, system-ui, sans-serif" font-size="28" font-weight="300" letter-spacing="10" fill="rgba(255,255,255,0.5)">Experience OS 1.0</text>

  <!-- Tagline -->
  <text x="256" y="455" text-anchor="middle" font-family="Segoe UI Variable, Segoe UI, system-ui, sans-serif" font-size="14" fill="rgba(255,255,255,0.2)" letter-spacing="4">CONSOLE GAMING EXPERIENCE</text>

  <!-- Version badge -->
  <rect x="188" y="468" width="136" height="24" rx="12" fill="rgba(16,124,16,0.2)" stroke="rgba(16,124,16,0.4)" stroke-width="1"/>
  <text x="256" y="485" text-anchor="middle" font-family="Segoe UI Variable, Segoe UI, system-ui, sans-serif" font-size="11" fill="#1db954">v1.0.0</text>
</svg>
