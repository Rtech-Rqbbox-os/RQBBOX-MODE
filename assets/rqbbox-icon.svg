<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e0e0e"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#1db954"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="url(#green)" stroke-width="3"/>
  
  <!-- Gamepad body -->
  <g transform="translate(30, 38)" filter="url(#glow)">
    <!-- Main body -->
    <rect x="0" y="10" width="60" height="30" rx="8" fill="url(#green)"/>
    
    <!-- Left grip -->
    <ellipse cx="8" cy="32" rx="10" ry="12" fill="url(#green)"/>
    
    <!-- Right grip -->
    <ellipse cx="52" cy="32" rx="10" ry="12" fill="url(#green)"/>
    
    <!-- D-pad -->
    <rect x="10" y="18" width="3" height="12" rx="1" fill="#0e0e0e"/>
    <rect x="6" y="22" width="12" height="3" rx="1" fill="#0e0e0e"/>
    
    <!-- ABXY buttons -->
    <circle cx="44" cy="18" r="3" fill="#0e0e0e"/>
    <circle cx="52" cy="24" r="3" fill="#0e0e0e"/>
    <circle cx="44" cy="30" r="3" fill="#0e0e0e"/>
    <circle cx="36" cy="24" r="3" fill="#0e0e0e"/>
    
    <!-- Button labels -->
    <text x="44" y="20" text-anchor="middle" font-size="4" fill="#107c10" font-weight="bold">Y</text>
    <text x="52" y="26" text-anchor="middle" font-size="4" fill="#107c10" font-weight="bold">B</text>
    <text x="44" y="32" text-anchor="middle" font-size="4" fill="#107c10" font-weight="bold">A</text>
    <text x="36" y="26" text-anchor="middle" font-size="4" fill="#107c10" font-weight="bold">X</text>
    
    <!-- Center button -->
    <circle cx="30" cy="24" r="5" fill="#0e0e0e"/>
    <path d="M 28 22 L 32 24 L 28 26 Z" fill="#107c10"/>
  </g>
  
  <!-- Text -->
  <text x="60" y="92" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" font-weight="700" fill="url(#green)">RQBBOX</text>
  <text x="60" y="104" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="7" fill="#a0a0a0" letter-spacing="3">M O D E</text>
</svg>
