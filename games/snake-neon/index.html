<!DOCTYPE html>
<html><head><title>Snake Neon</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;overflow:hidden;background:#050810;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}canvas{display:block;border-radius:12px}h1{font-weight:300;letter-spacing:4px;color:#00ff88;font-size:1.5rem}button{padding:8px 20px;background:#00ff88;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-family:inherit}.score{font-size:1rem;font-weight:200;color:rgba(255,255,255,.4)}</style></head><body>
<h1>SNAKE NEON</h1><div class="score" id="score">Score: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="startGame()">New Game</button>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
const GRID=20,COLS=20,ROWS=20;
let snake=[],food={},dx=0,dy=0,score=0,gameOver=false;
function startGame(){snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];dx=1;dy=0;score=0;gameOver=false;placeFood();requestAnimationFrame(gameLoop)}
function placeFood(){food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}}
function gameLoop(){if(gameOver){ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(0,0,400,400);ctx.fillStyle='#00ff88';ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText('GAME OVER',200,180);ctx.font='14px system-ui';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('Score: '+score,200,210);return}
update();draw();setTimeout(()=>requestAnimationFrame(gameLoop),100)}
function update(){const head={x:snake[0].x+dx,y:snake[0].y+dy};
if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver=true;return}
snake.unshift(head);
if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('score').textContent='Score: '+score;placeFood()}else{snake.pop()}}
function draw(){ctx.fillStyle='#050810';ctx.fillRect(0,0,400,400)
ctx.fillStyle='#00ff88';ctx.shadowColor='#00ff88';ctx.shadowBlur=15;snake.forEach((s,i)=>{ctx.fillStyle=i===0?'#00ff88':'#00cc66';ctx.fillRect(s.x*GRID,s.y*GRID,GRID-1,GRID-1)});ctx.shadowBlur=0
ctx.fillStyle='#ff0066';ctx.shadowColor='#ff0066';ctx.shadowBlur=20;ctx.fillRect(food.x*GRID,food.y*GRID,GRID-1,GRID-1);ctx.shadowBlur=0}
document.addEventListener('keydown',e=>{if(e.key==='ArrowUp'&&dy!==1){dx=0;dy=-1}
if(e.key==='ArrowDown'&&dy!==-1){dx=0;dy=1}
if(e.key==='ArrowLeft'&&dx!==1){dx=-1;dy=0}
if(e.key==='ArrowRight'&&dx!==-1){dx=1;dy=0}})
startGame()
</script></body></html>
