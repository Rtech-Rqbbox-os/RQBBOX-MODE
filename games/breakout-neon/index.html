<!DOCTYPE html>
<html><head><title>Breakout Neon</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;overflow:hidden;background:#050810;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}canvas{display:block;border-radius:12px}h1{font-weight:300;letter-spacing:4px;color:#ff00ff;font-size:1.5rem}button{padding:8px 20px;background:#ff00ff;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-family:inherit}.score{font-size:1rem;font-weight:200;color:rgba(255,255,255,.4)}</style></head><body>
<h1>BREAKOUT NEON</h1><div class="score" id="score">Score: 0</div>
<canvas id="game" width="500" height="400"></canvas>
<button onclick="startGame()">New Game</button>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
let paddle={x:225,y:370,w:100,h:15},ball={x:250,y:350,vx:3,vy:-3,r:8},bricks=[],score=0,gameOver=false;
function startGame(){paddle={x:225,y:370,w:100,h:15};ball={x:250,y:350,vx:3,vy:-3,r:8};bricks=[];score=0;gameOver=false;for(let r=0;r<5;r++)for(let c=0;c<10;c++)bricks.push({x:c*50+5,y:r*25+30,w:45,h:20,alive:true});requestAnimationFrame(gameLoop)}
function gameLoop(){if(gameOver){ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(0,0,500,400);ctx.fillStyle='#ff00ff';ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText('GAME OVER',250,180);ctx.font='14px system-ui';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('Score: '+score,250,210);return}
update();draw();requestAnimationFrame(gameLoop)}
function update(){ball.x+=ball.vx;ball.y+=ball.vy
if(ball.x<ball.r||ball.x>500-ball.r)ball.vx*=-1
if(ball.y<ball.r)ball.vy*=-1
if(ball.y>400-ball.r)gameOver=true
if(ball.y>paddle.y-ball.r&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){ball.vy=-Math.abs(ball.vy);ball.vx+=(ball.x-paddle.x-paddle.w/2)*0.1}
bricks.forEach(b=>{if(b.alive&&ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h){b.alive=false;const hitFromLeft=ball.vx>0&&ball.x<b.x;const hitFromRight=ball.vx<0&&ball.x>b.x+b.w;if(hitFromLeft||hitFromRight)ball.vx*=-1;else ball.vy*=-1;score+=10;document.getElementById('score').textContent='Score: '+score}})}
function draw(){ctx.fillStyle='#050810';ctx.fillRect(0,0,500,400)
const colors=['#ff00ff','#00ffff','#ff6600','#00ff00','#ffff00'];bricks.forEach((b,i)=>{if(b.alive){ctx.fillStyle=colors[i%5];ctx.shadowColor=colors[i%5];ctx.shadowBlur=10;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.shadowBlur=0}})
ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0
ctx.fillStyle='#00ffff';ctx.shadowColor='#00ffff';ctx.shadowBlur=15;ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);ctx.shadowBlur=0}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')paddle.x=Math.max(0,paddle.x-20)
if(e.key==='ArrowRight')paddle.x=Math.min(400,paddle.x+20)})
startGame()
</script></body></html>
