<!DOCTYPE html>
<html><head><title>Chess vs AI</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;overflow:hidden;background:#050810;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}canvas{display:block;border-radius:12px;cursor:pointer}h1{font-weight:300;letter-spacing:4px;color:#fff;font-size:1.5rem}button{padding:8px 20px;background:#fff;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-family:inherit}.info{font-size:.8rem;color:rgba(255,255,255,.4)}</style></head><body>
<h1>CHESS VS AI</h1><canvas id="game" width="480" height="480"></canvas>
<div class="info">Click to select and move pieces • White moves first</div>
<button onclick="startGame()">New Game</button>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
const SIZE=8,CELL=60;
const PIECES={'r':'♜','n':'♞','b':'♝','q':'♛','k':'♚','p':'♟','R':'♖','N':'♘','B':'♗','Q':'♕','K':'♔','P':'♙'};
let board=[],selected=null,turn='white';
function startGame(){board=['r','n','b','q','k','b','n','r','p','p','p','p','p','p','p','p','','','','','','','','','','','','','','','','','','','','','','P','P','P','P','P','P','P','P','R','N','B','Q','K','B','N','R'];selected=null;turn='white';draw()}
function draw(){ctx.fillStyle='#050810';ctx.fillRect(0,0,480,480)
for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){ctx.fillStyle=(x+y)%2?'#1a1a2e':'#252540';ctx.fillRect(x*CELL,y*CELL,CELL,CELL)
if(selected&&selected.x===x&&selected.y===y){ctx.fillStyle='rgba(0,255,136,.3)';ctx.fillRect(x*CELL,y*CELL,CELL,CELL)}
const piece=board[y*SIZE+x];if(piece){ctx.fillStyle=piece===piece.toUpperCase()?'#fff':'#ff6666';ctx.font='40px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(PIECES[piece],x*CELL+CELL/2,y*CELL+CELL/2)}}}
function isValidMove(fx,fy,tx,ty){const piece=board[fy*SIZE+fx];const target=board[ty*SIZE+tx];if(!piece)return false;if(target&&((piece===piece.toUpperCase())===(target===target.toUpperCase())))return false;const dx=tx-fx,dy=ty-fy,adx=Math.abs(dx),ady=Math.abs(dy);
const p=piece.toLowerCase();if(p==='p'){const dir=piece==='P'?-1:1;const start=piece==='P'?6:1;if(dx===0){if(!target&&fy+dir===ty)return true;if(target&&fy+dir===ty&&Math.abs(dx)===1)return true}return false}
if(p==='r')return dx===0||dy===0;if(p==='b')return adx===ady;if(p==='q')return dx===0||dy===0||adx===ady;if(p==='n')return(adx===1&&ady===2)||(adx===2&&ady===1);if(p==='k')return adx<=1&&ady<=1;return false}
function aiMove(){const moves=[];for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){const piece=board[y*SIZE+x];if(piece&&piece===piece.toLowerCase()){for(let ty=0;ty<SIZE;ty++)for(let tx=0;tx<SIZE;tx++)if(isValidMove(x,y,tx,ty))moves.push({fx:x,fy:y,tx,ty})}}if(moves.length){const move=moves[Math.floor(Math.random()*moves.length)];board[move.ty*SIZE+move.tx]=board[move.fy*SIZE+move.fx];board[move.fy*SIZE+move.fx]='';turn='white';draw()}}
c.addEventListener('click',e=>{const x=Math.floor(e.offsetX/CELL),y=Math.floor(e.offsetY/CELL);if(turn==='white'){if(selected){if(isValidMove(selected.x,selected.y,x,y)){board[y*SIZE+x]=board[selected.y*SIZE+selected.x];board[selected.y*SIZE+selected.x]='';selected=null;turn='black';draw();setTimeout(aiMove,500)}else{selected={x,y};draw()}}else{const piece=board[y*SIZE+x];if(piece&&piece===piece.toUpperCase()){selected={x,y};draw()}}}})
startGame()
</script></body></html>
