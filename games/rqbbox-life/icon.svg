<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#101030"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="256" y2="256">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <g opacity="0.04" stroke="white" stroke-width="0.5">
    <line x1="0" y1="32" x2="256" y2="32"/>
    <line x1="0" y1="64" x2="256" y2="64"/>
    <line x1="0" y1="96" x2="256" y2="96"/>
    <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="0" y1="224" x2="256" y2="224"/>
    <line x1="32" y1="0" x2="32" y2="256"/>
    <line x1="64" y1="0" x2="64" y2="256"/>
    <line x1="96" y1="0" x2="96" y2="256"/>
    <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="224" y1="0" x2="224" y2="256"/>
  </g>
  <circle cx="128" cy="128" r="80" fill="rgba(0,212,255,0.05)" filter="url(#glow)"/>
  <g transform="translate(128,128)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="url(#cyan)" stroke-width="3" opacity="0.3"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#cyan)" stroke-width="2" opacity="0.5"/>
    <text x="0" y="-50" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="14" font-weight="700" fill="#00d4ff" letter-spacing="4">RQBBOX</text>
    <text x="0" y="58" text-anchor="middle" font-family="Segoe UI,sans-serif" font-size="10" font-weight="300" fill="rgba(0,212,255,0.5)" letter-spacing="6">LIFE</text>
    <path d="M-20,-20 L-20,20 L20,0 Z" fill="url(#pulse)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="-30" cy="-30" r="4" fill="#00d4ff" opacity="0.6"/>
    <circle cx="30" cy="-25" r="3" fill="#00d4ff" opacity="0.4"/>
    <circle cx="-25" cy="30" r="3" fill="#00d4ff" opacity="0.5"/>
    <circle cx="28" cy="28" r="2" fill="#00d4ff" opacity="0.3"/>
  </g>
</svg>
