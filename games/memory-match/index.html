<!DOCTYPE html>
<html><head><title>Memory Match</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;overflow:hidden;background:#050810;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}canvas{display:block;border-radius:12px;cursor:pointer}h1{font-weight:300;letter-spacing:4px;color:#ff00ff;font-size:1.5rem}button{padding:8px 20px;background:#ff00ff;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-family:inherit}.score{font-size:1rem;font-weight:200;color:rgba(255,255,255,.4)}</style></head><body>
<h1>MEMORY MATCH</h1><div class="score" id="score">Moves: 0</div>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="startGame()">New Game</button>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
const SIZE=4,CELL=90,GAP=10;
const EMOJIS=['🎮','🎯','🎲','🎸','🎺','🎻','🎹','🎤'];
let cards=[],flipped=[],matched=[],moves=0;
function startGame(){const deck=[...EMOJIS,...EMOJIS];deck.sort(()=>Math.random()-.5);cards=deck.map((emoji,i)=>({emoji,flipped:false,matched:false}));flipped=[];matched=[];moves=0;document.getElementById('score').textContent='Moves: '+moves;draw()}
function draw(){ctx.fillStyle='#050810';ctx.fillRect(0,0,400,400)
cards.forEach((card,i)=>{const x=(i%SIZE)*(CELL+GAP)+GAP,y=Math.floor(i/SIZE)*(CELL+GAP)+GAP;ctx.fillStyle=card.flipped||card.matched?'#ff00ff':'#1a1a2e';ctx.shadowColor=card.flipped||card.matched?'#ff00ff':'transparent';ctx.shadowBlur=card.flipped||card.matched?15:0;ctx.fillRect(x,y,CELL,CELL);ctx.shadowBlur=0
if(card.flipped||card.matched){ctx.fillStyle='#000';ctx.font='40px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(card.emoji,x+CELL/2,y+CELL/2)}})}
c.addEventListener('click',e=>{if(flipped.length>=2)return;const idx=Math.floor(e.offsetY/(CELL+GAP))*SIZE+Math.floor(e.offsetX/(CELL+GAP));if(idx<0||idx>=cards.length||cards[idx].flipped||cards[idx].matched)return;cards[idx].flipped=true;flipped.push(idx);draw()
if(flipped.length===2){moves++;document.getElementById('score').textContent='Moves: '+moves;if(cards[flipped[0]].emoji===cards[flipped[1]].emoji){cards[flipped[0]].matched=true;cards[flipped[1]].matched=true;flipped=[]}else{setTimeout(()=>{cards[flipped[0]].flipped=false;cards[flipped[1]].flipped=false;flipped=[];draw()},1000)}}})
startGame()
</script></body></html>
