<!DOCTYPE html>
<html><head><title>Space Invaders Redux</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;overflow:hidden;background:#000;color:#fff;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}canvas{display:block;border-radius:12px}h1{font-weight:300;letter-spacing:4px;color:#00ff00;font-size:1.5rem}button{padding:8px 20px;background:#00ff00;border:none;border-radius:8px;color:#000;font-weight:600;cursor:pointer;font-family:inherit}.score{font-size:1rem;font-weight:200;color:rgba(255,255,255,.5)}</style></head><body>
<h1>SPACE INVADERS</h1><div class="score" id="score">Score: 0</div>
<canvas id="game" width="600" height="500"></canvas>
<button onclick="startGame()">New Game</button>
<script>
const c=document.getElementById('game'),ctx=c.getContext('2d');
let player={x:275,y:450,w:50,h:30},bullets=[],enemies=[],enemyBullets=[],score=0,gameOver=false,enemyDir=1;
function startGame(){player={x:275,y:450,w:50,h:30};bullets=[];enemies=[];enemyBullets=[];score=0;gameOver=false;enemyDir=1;for(let r=0;r<4;r++)for(let c=0;c<8;c++)enemies.push({x:50+c*60,y:50+r*40,w:40,h:30,alive:true});requestAnimationFrame(gameLoop)}
function gameLoop(){if(gameOver){ctx.fillStyle='rgba(0,0,0,.9)';ctx.fillRect(0,0,600,500);ctx.fillStyle='#00ff00';ctx.font='28px system-ui';ctx.textAlign='center';ctx.fillText('GAME OVER',300,230);ctx.font='16px system-ui';ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText('Score: '+score,300,270);return}
update();draw();requestAnimationFrame(gameLoop)}
function update(){bullets.forEach(b=>b.y-=8);bullets=bullets.filter(b=>b.y>0)
enemyBullets.forEach(b=>b.y+=4);enemyBullets=enemyBullets.filter(b=>b.y<500)
if(Math.random()<.02)enemies.filter(e=>e.alive).forEach(e=>{if(Math.random()<.05)enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h})})
bullets.forEach(b=>{enemies.forEach(e=>{if(e.alive&&b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;score+=10;document.getElementById('score').textContent='Score: '+score}})})
enemyBullets.forEach(b=>{if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+player.h)gameOver=true})
const alive=enemies.filter(e=>e.alive);enemies=enemies.filter(e=>e.alive);if(alive.length===0){startGame();return}
let moveDown=false;alive.forEach(e=>{e.x+=enemyDir;if(e.x<=0||e.x+e.w>=600)moveDown=true})
if(moveDown){enemyDir*=-1;alive.forEach(e=>e.y+=20)}
if(alive.some(e=>e.y+e.h>=player.y))gameOver=true}
function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,600,500)
ctx.fillStyle='#00ff00';ctx.shadowColor='#00ff00';ctx.shadowBlur=15;ctx.fillRect(player.x,player.y,player.w,player.h);ctx.shadowBlur=0
ctx.fillStyle='#fff';bullets.forEach(b=>ctx.fillRect(b.x-2,b.y,4,12))
ctx.fillStyle='#ff0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=10;enemyBullets.forEach(b=>ctx.fillRect(b.x-2,b.y,4,10));ctx.shadowBlur=0
enemies.forEach(e=>{if(e.alive){ctx.fillStyle='#ff00ff';ctx.shadowColor='#ff00ff';ctx.shadowBlur=10;ctx.fillRect(e.x,e.y,e.w,e.h);ctx.shadowBlur=0}})}
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')player.x=Math.max(0,player.x-15)
if(e.key==='ArrowRight')player.x=Math.min(550,player.x+15)
if(e.key===' ')bullets.push({x:player.x+player.w/2,y:player.y})})
startGame()
</script></body></html>
