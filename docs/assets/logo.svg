<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="50%" style="stop-color:#0096c7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="ring2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring1)" stroke-width="3" opacity="0.15"/>
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#ring2)" stroke-width="2" opacity="0.2"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#ring1)" stroke-width="4" opacity="0.25"/>
  <rect x="106" y="106" width="300" height="300" rx="60" fill="rgba(0,180,216,0.08)" stroke="url(#ring2)" stroke-width="2"/>
  <rect x="120" y="120" width="272" height="272" rx="48" fill="rgba(124,58,237,0.05)" stroke="url(#ring1)" stroke-width="1.5"/>
  <text x="256" y="276" font-family="system-ui,sans-serif" font-size="160" font-weight="800" text-anchor="middle" dominant-baseline="middle" fill="url(#ring1)" filter="url(#glow)">R</text>
  <text x="256" y="400" font-family="system-ui,sans-serif" font-size="28" font-weight="300" letter-spacing="12" text-anchor="middle" fill="rgba(255,255,255,0.2)">QBOX</text>
</svg>
