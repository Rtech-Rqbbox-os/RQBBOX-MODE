    <text x="-260" y="5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#1db954">Controller Nav</text>

    <rect x="-180" y="-16" width="120" height="32" rx="16" fill="rgba(16,124,16,0.15)" stroke="rgba(16,124,16,0.3)" stroke-width="1"/>
    <text x="-120" y="5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#1db954">Quick Resume</text>

    <rect x="-40" y="-16" width="90" height="32" rx="16" fill="rgba(16,124,16,0.15)" stroke="rgba(16,124,16,0.3)" stroke-width="1"/>
    <text x="5" y="5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#1db954">6 Games</text>

    <rect x="70" y="-16" width="120" height="32" rx="16" fill="rgba(16,124,16,0.15)" stroke="rgba(16,124,16,0.3)" stroke-width="1"/>
    <text x="130" y="5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#1db954">Cloud Gaming</text>

    <rect x="210" y="-16" width="130" height="32" rx="16" fill="rgba(16,124,16,0.15)" stroke="rgba(16,124,16,0.3)" stroke-width="1"/>
    <text x="275" y="5" font-family="Segoe UI, system-ui, sans-serif" font-size="12" fill="#1db954">Game Mode</text>
