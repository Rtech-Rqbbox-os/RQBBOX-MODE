  <!-- Accent line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#lineGrad)"/>
  <rect x="0" y="318" width="1280" height="2" fill="url(#lineGrad)"/>

  <!-- Left side: Gamepad icon -->
  <g transform="translate(100, 80) scale(0.9)" opacity="0.15">
    <path d="M 40 80 Q 40 40 80 40 L 160 40 Q 200 40 200 80 L 200 120 Q 200 160 240 180 L 260 190 Q 280 200 280 220 L 280 230 Q 280 250 260 250 L 240 245 Q 200 235 180 240 L 160 245 Q 120 250 80 245 L 60 240 Q 40 235 20 250 L 0 255 Q -20 260 -20 240 L -20 230 Q -20 210 0 200 L 20 190 Q 60 175 60 140 L 60 120 Q 60 80 40 80 Z" 
          fill="url(#green)"/>
    <ellipse cx="30" cy="210" rx="35" ry="50" fill="url(#green)" opacity="0.8"/>
    <ellipse cx="250" cy="210" rx="35" ry="50" fill="url(#green)" opacity="0.8"/>
    <circle cx="140" cy="140" r="18" fill="#0a0a0a" stroke="#1db954" stroke-width="2"/>
  </g>

  <!-- Main Title -->
  <text x="640" y="140" text-anchor="middle" font-family="Segoe UI Variable, Segoe UI, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="6" fill="url(#green)">RQBBOX Experience OS 1.0</text>

