<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#0e0e0e"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a5c0a"/>
      <stop offset="50%" style="stop-color:#107c10"/>
      <stop offset="100%" style="stop-color:#1db954"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(16,124,16,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="20%" style="stop-color:rgba(16,124,16,0.5)"/>
      <stop offset="80%" style="stop-color:rgba(16,124,16,0.5)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
