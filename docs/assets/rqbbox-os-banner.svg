<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#04060a"/>
      <stop offset="50%" style="stop-color:#08081a"/>
      <stop offset="100%" style="stop-color:#04060a"/>
    </linearGradient>
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="purpleCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect x="0" y="310" width="1280" height="10" fill="url(#cyanPurple)" opacity="0.6"/>
  <rect x="0" y="0" width="1280" height="4" fill="url(#purpleCyan)" opacity="0.4"/>
  <circle cx="200" cy="160" r="160" fill="url(#cyanPurple)" opacity="0.03"/>
  <circle cx="1080" cy="160" r="160" fill="url(#purpleCyan)" opacity="0.03"/>
  <g transform="translate(640,120)">
    <text text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="300" letter-spacing="10" fill="rgba(255,255,255,0.3)">RQBBOX</text>
    <text y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="52" font-weight="800" letter-spacing="8" fill="url(#cyanPurple)" filter="url(#glow)">EXPERIENCE OS</text>
    <text y="82" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="300" letter-spacing="6" fill="rgba(255,255,255,0.25)">VERSION 1.0 — THE ULTIMATE PLATFORM</text>
  </g>
  <g transform="translate(80,280)">
    <text font-family="system-ui,sans-serif" font-size="11" letter-spacing="2" fill="rgba(255,255,255,0.15)">By RhysTech</text>
  </g>
</svg>
